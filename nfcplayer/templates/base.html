<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NFC Player{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1><a href="{{ url_for('index') }}">🎵 NFC Player</a></h1>
    <nav>
      <a href="{{ url_for('index') }}">Cards</a>
      <a href="{{ url_for('card_new') }}">Add card</a>
      <a href="{{ url_for('settings') }}">Settings</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <footer>NFC Player v{{ app_version }}</footer>
  <script src="{{ url_for('static', filename='assign.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
